<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>우파 가게 디렉토리</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.4.0/dist/tabler-icons.min.css" />
  <style>
    :root {
      --bg:#ffffff; --bg-sec:#f5f5f4; --bg-tert:#eeede9; --bg-danger:#fef2f2;
      --text:#1a1a19; --text-sec:#57534e; --text-tert:#a8a29e;
      --text-danger:#991b1b;
      --border:rgba(0,0,0,0.1); --border-sec:rgba(0,0,0,0.18);
      --border-danger:rgba(239,68,68,0.35);
      --radius-md:8px; --radius-lg:12px;
    }
    @media (prefers-color-scheme:dark) {
      :root {
        --bg:#1c1c1b; --bg-sec:#262624; --bg-tert:#2e2e2b; --bg-danger:#2d1515;
        --text:#f0efec; --text-sec:#a8a29e; --text-tert:#57534e;
        --text-danger:#fca5a5;
        --border:rgba(255,255,255,0.1); --border-sec:rgba(255,255,255,0.18);
        --border-danger:rgba(239,68,68,0.3);
      }
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg-tert);color:var(--text);min-height:100vh;}

    /* 헤더 */
    .site-header{background:var(--bg);border-bottom:0.5px solid var(--border);padding:0 1.5rem;position:sticky;top:0;z-index:50;}
    .site-header-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:60px;}
    .site-logo{font-size:17px;font-weight:600;color:var(--text);text-decoration:none;display:flex;align-items:center;gap:8px;}

    /* 메인 */
    .main{max-width:1100px;margin:0 auto;padding:2rem 1.5rem;}
    .hero{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:2rem;margin-bottom:1.5rem;}
    .hero h1{font-size:24px;font-weight:700;margin-bottom:6px;}
    .hero p{font-size:15px;color:var(--text-sec);line-height:1.6;}

    /* 통계 */
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem;}
    .stat-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-md);padding:1rem 1.1rem;}
    .stat-label{font-size:12px;color:var(--text-sec);margin-bottom:4px;}
    .stat-value{font-size:22px;font-weight:600;}

    /* 탭 */
    .tabs{display:flex;gap:4px;margin-bottom:1.25rem;}
    .tab{padding:8px 18px;font-size:14px;border:0.5px solid var(--border-sec);border-radius:var(--radius-md);cursor:pointer;background:transparent;color:var(--text-sec);transition:all 0.15s;font-family:inherit;}
    .tab.active{background:var(--bg);color:var(--text);border-color:var(--text);font-weight:500;}
    .tab:hover:not(.active){background:var(--bg-sec);}

    /* 그리드 & 카드 */
    .business-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px;}
    .biz-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:box-shadow 0.15s;}
    .biz-card:hover{box-shadow:0 4px 20px rgba(0,0,0,0.08);}
    .biz-card.cancelled{border-color:var(--border-danger);}
    .biz-thumb-wrap{position:relative;width:100%;height:155px;overflow:hidden;}
    .biz-thumb{width:100%;height:100%;object-fit:cover;display:block;}
    .biz-thumb-placeholder{width:100%;height:100%;background:var(--bg-sec);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--text-tert);font-size:12px;}
    .cancelled-dim{position:absolute;inset:0;background:rgba(153,27,27,0.5);display:flex;align-items:center;justify-content:center;}
    .cancelled-dim span{color:#fff;font-size:14px;font-weight:600;background:rgba(0,0,0,0.3);padding:4px 12px;border-radius:20px;}
    .biz-body{padding:1rem 1.1rem 0.9rem;}
    .biz-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px;gap:8px;}
    .biz-name{font-size:15px;font-weight:600;flex:1;}
    .biz-category{font-size:12px;color:var(--text-sec);margin-bottom:5px;}
    .biz-desc{font-size:13px;color:var(--text-sec);line-height:1.55;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:40px;}

    /* 도로명 주소 */
    .biz-address{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--text-sec);margin-bottom:10px;cursor:pointer;position:relative;text-decoration:none;}
    .biz-address:hover .addr-text{text-decoration:underline;color:var(--text);}
    .addr-text{transition:color 0.15s;}

    /* 지도 선택 팝업 */
    .map-popup{display:none;position:absolute;left:0;top:calc(100% + 5px);background:var(--bg);border:0.5px solid var(--border-sec);border-radius:var(--radius-md);box-shadow:0 6px 24px rgba(0,0,0,0.12);z-index:100;min-width:170px;overflow:hidden;}
    .map-popup.open{display:block;}
    .map-popup-item{display:flex;align-items:center;gap:9px;padding:10px 14px;font-size:13px;cursor:pointer;transition:background 0.12s;text-decoration:none;color:var(--text);}
    .map-popup-item:hover{background:var(--bg-sec);}
    .map-logo{width:20px;height:20px;border-radius:5px;object-fit:contain;flex-shrink:0;}
    .map-divider{height:0.5px;background:var(--border);margin:0 10px;}

    /* 신고 섹션 */
    .trust-section{border-top:0.5px solid var(--border);padding-top:10px;}
    .trust-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
    .trust-label{font-size:12px;color:var(--text-sec);}
    .dots-row{display:flex;gap:4px;margin-bottom:7px;}
    .dot{width:15px;height:15px;border-radius:50%;border:1.5px solid var(--border-sec);background:transparent;transition:background 0.2s;}
    .dot.green{background:#16a34a;border-color:#16a34a;}
    .dot.amber{background:#d97706;border-color:#d97706;}
    .dot.red{background:#dc2626;border-color:#dc2626;}
    .trust-footer{display:flex;justify-content:space-between;align-items:center;}
    .report-hint{font-size:11px;color:var(--text-tert);}

    /* 상태 태그 */
    .status-tag{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500;white-space:nowrap;flex-shrink:0;}
    .tag-good{background:#dcfce7;color:#166534;}
    .tag-caution{background:#fef9c3;color:#854d0e;}
    .tag-warning{background:#ffedd5;color:#9a3412;}
    .tag-cancelled{background:#fee2e2;color:#991b1b;}

    /* 버튼 */
    .btn{font-family:inherit;cursor:pointer;border-radius:var(--radius-md);font-size:14px;padding:9px 18px;font-weight:500;transition:all 0.15s;}
    .btn-primary{background:var(--text);color:var(--bg);border:none;}
    .btn-primary:hover{opacity:0.85;}
    .btn-ghost{background:transparent;border:0.5px solid var(--border-sec);color:var(--text-sec);}
    .btn-ghost:hover{background:var(--bg-sec);}
    .btn-report{background:transparent;border:0.5px solid var(--border-danger);color:var(--text-danger);border-radius:var(--radius-md);padding:5px 11px;font-size:12px;cursor:pointer;font-family:inherit;transition:background 0.15s;}
    .btn-report:hover{background:var(--bg-danger);}
    .btn-report:disabled{opacity:0.4;cursor:not-allowed;}

    /* 모달 */
    .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;align-items:center;justify-content:center;padding:1rem;}
    .modal-bg.open{display:flex;}
    .modal{background:var(--bg);border-radius:var(--radius-lg);padding:1.75rem;width:520px;max-width:100%;border:0.5px solid var(--border-sec);max-height:92vh;overflow-y:auto;}
    .modal h2{font-size:19px;font-weight:600;margin-bottom:1.25rem;}
    .form-group{margin-bottom:1rem;}
    .form-group label{display:block;font-size:13px;color:var(--text-sec);margin-bottom:5px;}
    .form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 11px;border:0.5px solid var(--border-sec);border-radius:var(--radius-md);font-size:14px;background:var(--bg);color:var(--text);font-family:inherit;outline:none;transition:border-color 0.15s;}
    .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--text);}
    .form-group textarea{resize:vertical;min-height:72px;line-height:1.5;}
    .checkbox-row{display:flex;align-items:flex-start;gap:10px;padding:11px;background:var(--bg-sec);border-radius:var(--radius-md);border:0.5px solid var(--border);}
    .checkbox-row input[type=checkbox]{margin-top:2px;width:15px;height:15px;flex-shrink:0;accent-color:var(--text);cursor:pointer;}
    .checkbox-row label{font-size:13px;color:var(--text-sec);line-height:1.55;cursor:pointer;}
    .upload-zone{border:1.5px dashed var(--border-sec);border-radius:var(--radius-md);padding:1.5rem 1rem;text-align:center;cursor:pointer;position:relative;transition:border-color 0.15s,background 0.15s;}
    .upload-zone:hover,.upload-zone.drag-over{border-color:var(--text);background:var(--bg-sec);}
    .upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
    .upload-icon{font-size:32px;color:var(--text-tert);display:block;margin-bottom:8px;}
    .upload-zone p{font-size:13px;color:var(--text-sec);}
    .upload-zone small{font-size:11px;color:var(--text-tert);}
    .thumb-preview{width:100%;height:170px;object-fit:cover;border-radius:var(--radius-md);border:0.5px solid var(--border);display:block;margin-top:10px;}
    .thumb-remove{display:none;align-items:center;gap:5px;margin-top:7px;font-size:12px;color:var(--text-danger);cursor:pointer;background:none;border:none;font-family:inherit;padding:0;}
    .modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:1.5rem;padding-top:1rem;border-top:0.5px solid var(--border);}
    .info-note{font-size:12px;color:var(--text-sec);padding:8px 11px;background:var(--bg-sec);border-radius:var(--radius-md);border:0.5px solid var(--border);line-height:1.5;}
    .danger-box{background:var(--bg-danger);border:0.5px solid var(--border-danger);border-radius:var(--radius-md);padding:11px 14px;margin-bottom:1.25rem;font-size:13px;color:var(--text-danger);line-height:1.5;}
    .empty-state{grid-column:1/-1;text-align:center;padding:4rem 1rem;color:var(--text-tert);font-size:14px;}
    .empty-state i{font-size:36px;display:block;margin-bottom:10px;}
    .tip-wrap{position:relative;display:inline-block;}
    .tip-icon{font-size:13px;color:var(--text-tert);cursor:default;vertical-align:-1px;}
    .tip-box{display:none;position:absolute;bottom:130%;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);font-size:12px;padding:7px 11px;border-radius:var(--radius-md);white-space:nowrap;z-index:999;line-height:1.6;pointer-events:none;}
    .tip-wrap:hover .tip-box{display:block;}
    .toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:11px 20px;border-radius:var(--radius-md);font-size:14px;z-index:9999;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;max-width:90vw;box-shadow:0 4px 20px rgba(0,0,0,0.2);}
    .toast.show{opacity:1;}

    @media(max-width:600px){
      .main{padding:1rem;}
      .stats{gap:8px;}
      .hero{padding:1.25rem;}
    }
  </style>
</head>
<body>

<header class="site-header">
  <div class="site-header-inner">
    <a class="site-logo" href="#">🇰🇷 우파 가게 디렉토리</a>
    <button class="btn btn-primary" onclick="openRegisterModal()">+ 사업체 등록</button>
  </div>
</header>

<main class="main">
  <div class="hero">
    <h1>보수 가치를 지지하는 가게를 찾아보세요</h1>
    <p>자유시장, 전통 가족 가치, 국가 안보를 지지하는 우파 성향 사업체들이 모여 있습니다.</p>
  </div>

  <div class="stats">
    <div class="stat-card"><div class="stat-label">전체 사업체</div><div class="stat-value" id="stat-total">0</div></div>
    <div class="stat-card"><div class="stat-label">활성 사업체</div><div class="stat-value" id="stat-active">0</div></div>
    <div class="stat-card"><div class="stat-label">취소 사업체</div><div class="stat-value" id="stat-cancelled">0</div></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('active',this)">활성 목록</button>
    <button class="tab" onclick="switchTab('cancelled',this)">취소 우파가게 리스트</button>
  </div>

  <div id="tab-active">
    <div class="business-grid" id="active-list"></div>
  </div>
  <div id="tab-cancelled" style="display:none;">
    <div class="danger-box">
      <i class="ti ti-alert-triangle" style="font-size:15px;vertical-align:-2px;margin-right:6px;" aria-hidden="true"></i>
      신고가 충분히 누적된 사업체는 자동으로 이 목록으로 이동됩니다. 단발성 신고로는 취소되지 않습니다.
    </div>
    <div class="business-grid" id="cancelled-list"></div>
  </div>
</main>

<!-- 등록 모달 -->
<div class="modal-bg" id="register-modal">
  <div class="modal">
    <h2>사업체 등록</h2>
    <div class="form-group">
      <label>대표 사진 <span style="color:var(--text-tert);font-size:11px;">JPG · PNG · WEBP · 최대 5MB (선택)</span></label>
      <div class="upload-zone" id="upload-zone">
        <input type="file" id="thumb-input" accept="image/jpeg,image/png,image/webp" onchange="handleThumbChange(event)" />
        <div id="upload-placeholder">
          <i class="ti ti-photo-up upload-icon" aria-hidden="true"></i>
          <p>클릭하거나 사진을 여기에 끌어다 놓으세요</p>
          <small>가게 외관, 메뉴, 인테리어 등 대표 사진</small>
        </div>
        <img id="thumb-preview-img" class="thumb-preview" style="display:none;" alt="미리보기" />
      </div>
      <button class="thumb-remove" id="thumb-remove-btn" onclick="removeThumb()">
        <i class="ti ti-x"></i> 사진 제거
      </button>
    </div>
    <div class="form-group"><label>사업체명 *</label><input type="text" id="reg-name" placeholder="예: 태극 카페" /></div>
    <div class="form-group">
      <label>업종 *</label>
      <select id="reg-category">
        <option value="">선택하세요</option>
        <option>음식점/카페</option><option>소매/유통</option><option>전문직/서비스</option>
        <option>교육/학원</option><option>건강/미용</option><option>기타</option>
      </select>
    </div>
    <div class="form-group"><label>사업체 소개</label><textarea id="reg-desc" placeholder="사업체를 간단히 소개해 주세요"></textarea></div>
    <div class="form-group">
      <label>도로명 주소 *</label>
      <input type="text" id="reg-address" placeholder="예: 서울특별시 종로구 세종대로 175" />
    </div>
    <div class="form-group">
      <label>확인 서약 *</label>
      <div class="checkbox-row">
        <input type="checkbox" id="reg-confirm" />
        <label for="reg-confirm">본 사업체는 보수적 가치(자유시장, 전통적 가족 가치, 국가 안보 등)를 지지하며, 우파 성향의 사업체임을 확인하고 동의합니다.</label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('register-modal')">취소</button>
      <button class="btn btn-primary" onclick="submitRegistration()">등록 신청</button>
    </div>
  </div>
</div>

<!-- 신고 모달 -->
<div class="modal-bg" id="report-modal">
  <div class="modal">
    <h2>사업체 신고</h2>
    <p style="font-size:13px;color:var(--text-sec);margin-bottom:1rem;" id="report-target-name"></p>
    <div class="form-group">
      <label>신고 사유 *</label>
      <select id="report-reason">
        <option value="">선택하세요</option>
        <option>허위 정보 등록</option><option>우파 성향 사업체 아님</option>
        <option>불법/비윤리적 행위</option><option>서비스 품질 문제</option><option>기타</option>
      </select>
    </div>
    <div class="form-group"><label>상세 내용</label><textarea id="report-detail" placeholder="신고 내용을 자세히 작성해 주세요"></textarea></div>
    <div class="info-note">
      <i class="ti ti-shield" style="font-size:13px;vertical-align:-1px;margin-right:4px;" aria-hidden="true"></i>
      소수의 신고로는 취소되지 않습니다. 여러 사람의 신고가 쌓여야 반영됩니다.
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('report-modal')">취소</button>
      <button class="btn btn-primary" onclick="submitReport()">신고 접수</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const WILSON_THRESHOLD = 0.30, Z = 1.96, MAX_FILE_SIZE = 5*1024*1024;

function wilsonScore(r, v) {
  if (!v) return 0;
  const p=r/v, z2=Z*Z;
  return Math.max(0,(p+z2/(2*v)-Z*Math.sqrt((p*(1-p)+z2/(4*v))/v))/(1+z2/v));
}
function trustLevel(s) {
  if (s>=WILSON_THRESHOLD)       return {level:4,label:'취소됨',    cls:'tag-cancelled'};
  if (s>=WILSON_THRESHOLD*0.6)   return {level:3,label:'신고 다수', cls:'tag-warning'};
  if (s>=WILSON_THRESHOLD*0.3)   return {level:2,label:'신고 있음', cls:'tag-caution'};
  return                                {level:1,label:'신뢰 양호', cls:'tag-good'};
}
function dotsHtml(lv) {
  const n=lv>=4?5:lv===3?4:lv===2?2:1, c=lv>=4?'red':lv>=2?'amber':'green';
  return Array.from({length:5},(_,i)=>`<div class="dot ${i<n?c:''}"></div>`).join('');
}
function getSid() {
  let id=sessionStorage.getItem('_sid');
  if(!id){id='u_'+Math.random().toString(36).slice(2);sessionStorage.setItem('_sid',id);}
  return id;
}

/* 지도 URL 생성 */
function naverMapUrl(address, name) {
  return `https://map.naver.com/v5/search/${encodeURIComponent(address+' '+name)}`;
}
function kakaoMapUrl(address, name) {
  return `https://map.kakao.com/?q=${encodeURIComponent(address+' '+name)}`;
}

const PLACEHOLDER = {
  '음식점/카페':'https://images.unsplash.com/photo-1555396273-367ea4eb4db5?w=500&q=70',
  '소매/유통':'https://images.unsplash.com/photo-1604719312566-8912e9227c6a?w=500&q=70',
  '전문직/서비스':'https://images.unsplash.com/photo-1497366216548-37526070297c?w=500&q=70',
  '교육/학원':'https://images.unsplash.com/photo-1503676260728-1c00da094a0b?w=500&q=70',
  '건강/미용':'https://images.unsplash.com/photo-1560066984-138dadb4c035?w=500&q=70',
};

let pendingThumb=null, reportingId=null;

let db = {
  nextId:7,
  businesses:[
    {id:1,name:'태극 한식당',   category:'음식점/카페',  desc:'전통 한식으로 건강한 한끼를 제공합니다. 국내산 재료만 사용합니다.',     address:'서울특별시 종로구 세종대로 175',    reports:1, views:40,reportedBy:['u_s1'],thumb:null},
    {id:2,name:'자유 서점',     category:'소매/유통',    desc:'보수 논평, 역사, 경제 분야 서적을 전문으로 취급하는 독립 서점입니다.',  address:'부산광역시 해운대구 해운대해변로 264',reports:2, views:35,reportedBy:['u_s2','u_s3'],thumb:null},
    {id:3,name:'애국 세탁소',   category:'기타',         desc:'20년 전통의 동네 세탁소입니다. 친절하고 꼼꼼한 서비스를 약속드립니다.',address:'대구광역시 중구 동성로 20',           reports:8, views:22,reportedBy:['u_s4','u_s5','u_s6','u_s7','u_s8','u_s9','u_s10','u_s11'],thumb:null},
    {id:4,name:'나라사랑 학원', category:'교육/학원',    desc:'올바른 역사 교육과 국어 교육을 통해 미래 세대를 양성합니다.',          address:'인천광역시 남동구 소래로 100',        reports:14,views:20,reportedBy:['u_a1','u_a2','u_a3','u_a4','u_a5','u_a6','u_a7','u_a8','u_a9','u_a10','u_a11','u_a12','u_a13','u_a14'],thumb:null},
    {id:5,name:'전통 이발소',   category:'건강/미용',    desc:'30년 경력의 이발사가 운영하는 정통 이발소입니다.',                    address:'서울특별시 마포구 홍익로 20',         reports:0, views:18,reportedBy:[],thumb:null},
    {id:6,name:'한강 치킨',     category:'음식점/카페',  desc:'국내산 닭만 사용하는 수제 치킨 전문점입니다.',                        address:'서울특별시 용산구 이태원로 200',       reports:3, views:9, reportedBy:['u_b1','u_b2','u_b3'],thumb:null},
  ]
};

function computeStatus(b){return wilsonScore(b.reports,b.views)>WILSON_THRESHOLD?'cancelled':'active';}
function thumbSrc(b){return b.thumb||PLACEHOLDER[b.category]||null;}

function render(){
  const active=db.businesses.filter(b=>computeStatus(b)==='active');
  const cancelled=db.businesses.filter(b=>computeStatus(b)==='cancelled');
  document.getElementById('stat-total').textContent=db.businesses.length;
  document.getElementById('stat-active').textContent=active.length;
  document.getElementById('stat-cancelled').textContent=cancelled.length;
  renderList('active-list',active,false);
  renderList('cancelled-list',cancelled,true);
}

function renderList(elId,list,isCancelled){
  const el=document.getElementById(elId), sid=getSid();
  if(!list.length){
    el.innerHTML=`<div class="empty-state"><i class="ti ti-building" aria-hidden="true"></i>${isCancelled?'취소된 사업체가 없습니다.':'등록된 사업체가 없습니다.'}</div>`;
    return;
  }
  el.innerHTML=list.map(b=>{
    const score=wilsonScore(b.reports,b.views);
    const trust=trustLevel(score);
    const dots=dotsHtml(trust.level);
    const already=b.reportedBy.includes(sid);
    const hint=b.reports===0?'아직 신고가 없습니다':`${b.reports}명이 신고했습니다`;
    const src=thumbSrc(b);
    const esc=s=>s.replace(/"/g,'&quot;').replace(/'/g,'&#39;');

    const thumbHtml=src
      ?`<div class="biz-thumb-wrap">
          <img class="biz-thumb" src="${src}" alt="${b.name}" loading="lazy"
            onerror="this.parentElement.innerHTML='<div class=biz-thumb-placeholder><i class=ti aria-hidden=true style=font-size:28px>📷</i><span>이미지 없음</span></div>'" />
          ${isCancelled?'<div class="cancelled-dim"><span>취소됨</span></div>':''}
        </div>`
      :`<div class="biz-thumb-wrap"><div class="biz-thumb-placeholder">
          <i class="ti ti-photo" style="font-size:28px;" aria-hidden="true"></i><span>사진 없음</span>
        </div></div>`;

    const addressHtml=b.address
      ?`<div style="position:relative;display:inline-block;margin-bottom:10px;">
          <span class="biz-address" onclick="toggleMapPopup(event,'map-${b.id}')">
            <i class="ti ti-map-pin" style="font-size:13px;flex-shrink:0;" aria-hidden="true"></i>
            <span class="addr-text">${b.address}</span>
            <i class="ti ti-chevron-down" style="font-size:11px;color:var(--text-tert);" aria-hidden="true"></i>
          </span>
          <div class="map-popup" id="map-${b.id}">
            <a class="map-popup-item" href="${naverMapUrl(esc(b.address),esc(b.name))}" target="_blank" rel="noopener">
              <img class="map-logo" src="https://ssl.pstatic.net/static/maps/mantle/map/ico_navermap.png"
                onerror="this.style.display='none'" alt="" />
              네이버지도에서 보기
            </a>
            <div class="map-divider"></div>
            <a class="map-popup-item" href="${kakaoMapUrl(esc(b.address),esc(b.name))}" target="_blank" rel="noopener">
              <img class="map-logo" src="https://t1.kakaocdn.net/kakaocorp/kakaocorp/admin/5cd97e7f017800001.png"
                onerror="this.style.display='none'" alt="" />
              카카오지도에서 보기
            </a>
          </div>
        </div>`
      :`<div style="font-size:12px;color:var(--text-tert);margin-bottom:10px;">주소 미등록</div>`;

    return `
    <article class="biz-card ${isCancelled?'cancelled':''}">
      ${thumbHtml}
      <div class="biz-body">
        <div class="biz-top">
          <div class="biz-name">${b.name}</div>
          <span class="status-tag ${trust.cls}">${trust.label}</span>
        </div>
        <div class="biz-category">${b.category}</div>
        ${addressHtml}
        <div class="biz-desc">${b.desc||'소개 없음'}</div>
        <div class="trust-section">
          <div class="trust-top">
            <span class="trust-label">신고 누적도
              <span class="tip-wrap">
                <i class="ti ti-help-circle tip-icon" aria-hidden="true"></i>
                <span class="tip-box">여러 사람의 신고가 쌓일수록 점이 채워집니다.<br>소수 신고로는 취소되지 않습니다.</span>
              </span>
            </span>
          </div>
          <div class="dots-row">${dots}</div>
          <div class="trust-footer">
            <span class="report-hint">${hint}</span>
            ${!isCancelled?`<button class="btn-report" onclick="openReportModal(${b.id})" ${already?'disabled':''}>${already?'신고완료':'신고하기'}</button>`:''}
          </div>
        </div>
      </div>
    </article>`;
  }).join('');
}

/* 지도 팝업 토글 */
function toggleMapPopup(e, id) {
  e.stopPropagation();
  const popup=document.getElementById(id);
  const isOpen=popup.classList.contains('open');
  // 모든 팝업 닫기
  document.querySelectorAll('.map-popup.open').forEach(p=>p.classList.remove('open'));
  if(!isOpen) popup.classList.add('open');
}
// 바깥 클릭 시 팝업 닫기
document.addEventListener('click', ()=>{
  document.querySelectorAll('.map-popup.open').forEach(p=>p.classList.remove('open'));
});

function switchTab(tab,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-active').style.display=tab==='active'?'':'none';
  document.getElementById('tab-cancelled').style.display=tab==='cancelled'?'':'none';
}

function openRegisterModal(){
  ['reg-name','reg-desc','reg-address'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('reg-category').value='';
  document.getElementById('reg-confirm').checked=false;
  removeThumb();
  document.getElementById('register-modal').classList.add('open');
}
function closeModal(id){document.getElementById(id).classList.remove('open');}

function handleThumbChange(e){
  const file=e.target.files[0];
  if(!file)return;
  if(file.size>MAX_FILE_SIZE){showToast('파일 크기는 5MB 이하여야 합니다.');return;}
  const r=new FileReader();
  r.onload=ev=>applyThumb(ev.target.result);
  r.readAsDataURL(file);
}
function applyThumb(url){
  pendingThumb=url;
  document.getElementById('upload-placeholder').style.display='none';
  const img=document.getElementById('thumb-preview-img');
  img.src=url; img.style.display='block';
  document.getElementById('thumb-remove-btn').style.display='flex';
}
function removeThumb(){
  pendingThumb=null;
  document.getElementById('thumb-input').value='';
  const img=document.getElementById('thumb-preview-img');
  img.style.display='none'; img.src='';
  document.getElementById('upload-placeholder').style.display='';
  document.getElementById('thumb-remove-btn').style.display='none';
}

const zone=document.getElementById('upload-zone');
zone.addEventListener('dragover',e=>{e.preventDefault();zone.classList.add('drag-over');});
zone.addEventListener('dragleave',()=>zone.classList.remove('drag-over'));
zone.addEventListener('drop',e=>{
  e.preventDefault(); zone.classList.remove('drag-over');
  const file=e.dataTransfer.files[0];
  if(!file||!file.type.startsWith('image/')){showToast('이미지 파일만 업로드할 수 있습니다.');return;}
  if(file.size>MAX_FILE_SIZE){showToast('파일 크기는 5MB 이하여야 합니다.');return;}
  const r=new FileReader();
  r.onload=ev=>applyThumb(ev.target.result);
  r.readAsDataURL(file);
});

function submitRegistration(){
  const name=document.getElementById('reg-name').value.trim();
  const category=document.getElementById('reg-category').value;
  const desc=document.getElementById('reg-desc').value.trim();
  const address=document.getElementById('reg-address').value.trim();
  const confirmed=document.getElementById('reg-confirm').checked;
  if(!name){showToast('사업체명을 입력해 주세요.');return;}
  if(!category){showToast('업종을 선택해 주세요.');return;}
  if(!address){showToast('도로명 주소를 입력해 주세요.');return;}
  if(!confirmed){showToast('확인 서약에 동의해 주세요.');return;}
  db.businesses.push({id:db.nextId++,name,category,desc,address,reports:0,views:1,reportedBy:[],thumb:pendingThumb});
  render();
  closeModal('register-modal');
  showToast('사업체가 등록되었습니다!');
}

function openReportModal(id){
  reportingId=id;
  const biz=db.businesses.find(b=>b.id===id);
  document.getElementById('report-target-name').textContent=`대상: ${biz.name}`;
  document.getElementById('report-reason').value='';
  document.getElementById('report-detail').value='';
  document.getElementById('report-modal').classList.add('open');
}
function submitReport(){
  const reason=document.getElementById('report-reason').value;
  if(!reason){showToast('신고 사유를 선택해 주세요.');return;}
  const sid=getSid();
  const biz=db.businesses.find(b=>b.id===reportingId);
  if(!biz)return;
  if(biz.reportedBy.includes(sid)){showToast('이미 신고한 사업체입니다.');return;}
  biz.reportedBy.push(sid); biz.reports++;
  biz.views=Math.max(biz.views,biz.reports);
  const score=wilsonScore(biz.reports,biz.views);
  render(); closeModal('report-modal');
  if(score>WILSON_THRESHOLD){
    showToast(`'${biz.name}'이(가) 신고 누적으로 취소 목록으로 이동되었습니다.`);
    setTimeout(()=>switchTab('cancelled',document.querySelectorAll('.tab')[1]),1300);
  } else {
    showToast(`신고 접수 완료. 현재 상태: ${trustLevel(score).label}`);
  }
}

document.querySelectorAll('.modal-bg').forEach(m=>{
  m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open');});
});

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(window._tt);
  window._tt=setTimeout(()=>t.classList.remove('show'),3500);
}

render();
</script>
</body>
</html>
